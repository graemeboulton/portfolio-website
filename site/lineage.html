layout: none
title: Data Lineage Explorer
permalink: /lineage.html
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Data Lineage Explorer</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#253047;--border:#334155;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;
  --gold:#ca8a04;--green:#16a34a;--blue:#2563eb;--purple:#7c3aed;
  --tableau:#e07028;
  --sidebar:272px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}

/* ── SIDEBAR ─────────────────────────────────────── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
#sidebar-head h1{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px}
#search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:12px;outline:none}
#search:focus{border-color:var(--accent)}
#overview-btn{display:block;width:100%;margin-top:8px;padding:7px 10px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;text-align:left}
#overview-btn:hover{background:#2563eb}
#tier-filters{display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border)}
.tier-pill{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;opacity:0.45;border:1px solid transparent;transition:opacity .15s}
.tier-pill.active{opacity:1;border-color:currentColor}
#sidebar-list{flex:1;overflow-y:auto;padding:8px 0}
#sidebar-list::-webkit-scrollbar{width:4px}
#sidebar-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.schema-group{}
.schema-label{padding:6px 14px 3px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.schema-label:hover{color:var(--text)}
.schema-label span.count{font-weight:400;opacity:.6}
.schema-items{}
.sidebar-item{display:flex;align-items:center;gap:7px;padding:5px 14px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:var(--surface2);border-left-color:var(--accent)}
.si-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.si-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.si-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--tableau);color:#fff;flex-shrink:0}

/* ── MAIN ────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
#topbar-title{font-size:13px;font-weight:600;color:var(--text)}
#topbar-sub{font-size:11px;color:var(--muted)}
#back-btn{display:none;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-size:12px}
#back-btn:hover{background:var(--border)}
#content{flex:1;overflow-y:auto;padding:16px 20px}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── SVG ARROWS ──────────────────────────────────── */
#pipeline-wrap{position:relative}
#arrows-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.arrow-path{fill:none;stroke-width:1.5;opacity:.7}

/* ── TIER ROWS ───────────────────────────────────── */
.tier-row{margin-bottom:12px}
.tier-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tier-badge{height:4px;width:28px;border-radius:2px;flex-shrink:0}
.tier-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tier-desc{font-size:11px;color:var(--muted)}
.tier-nodes{display:flex;flex-wrap:wrap;gap:8px}

/* ── NODE CARDS ──────────────────────────────────── */
.node-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;min-width:160px;max-width:220px;flex:1}
.node-card:hover{border-color:var(--accent);background:var(--surface2)}
.node-card.focused{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 0 1px var(--accent)}
.node-card.faded{opacity:.2;pointer-events:none}
.node-card.ancestor{border-color:rgba(255,255,255,.25)}
.nc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.nc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px}
.nc-name{font-size:11px;font-weight:600;line-height:1.3;flex:1}
.nc-schema{font-size:10px;color:var(--muted);margin-bottom:4px;margin-left:14px}
.nc-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-left:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nc-foot{display:flex;align-items:center;gap:4px;margin-top:6px;margin-left:14px;flex-wrap:wrap}
.nc-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.nc-tableau{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--tableau);color:#fff}
.nc-type{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* ── DETAIL PANEL ────────────────────────────────── */
#detail-panel{display:none;position:fixed;top:0;right:0;width:320px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:100;overflow-y:auto;flex-direction:column}
#detail-panel.open{display:flex}
#dp-close{position:sticky;top:0;background:var(--surface);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#dp-close button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
#dp-close button:hover{background:var(--border);color:var(--text)}
#dp-body{padding:14px;flex:1}
.dp-section{margin-bottom:14px}
.dp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.dp-value{font-size:12px;line-height:1.5;color:var(--text)}
.dp-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);margin:2px 2px 0 0}
.dp-dep{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg);border-radius:5px;margin-bottom:4px;cursor:pointer}
.dp-dep:hover{background:var(--border)}
.dp-dep-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dp-dep-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-tableau-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(224,112,40,.12);border:1px solid rgba(224,112,40,.3);border-radius:5px;margin-bottom:4px}
.dp-tableau-icon{font-size:14px}
.dp-tableau-name{font-size:11px;color:var(--text)}

/* ── STATS BAR ───────────────────────────────────── */
#stats-bar{display:flex;gap:16px;padding:10px 0 14px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:1px}
.stat-val{font-size:18px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* ── LOADING ─────────────────────────────────────── */
#loading{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px}
#loading p{color:var(--muted);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-head">
    <h1>Data Lineage Explorer</h1>
    <input id="search" type="text" placeholder="Search tables…"/>
    <button id="overview-btn">◉ Full Pipeline Overview</button>
  </div>
  <div id="tier-filters"></div>
  <div id="sidebar-list"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="back-btn">← Back</button>
    <span id="topbar-title">Pipeline Overview</span>
    <span id="topbar-sub"></span>
  </div>
  <div id="content">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading lineage data…</p>
    </div>
  </div>
</div>

<div id="detail-panel">
  <div id="dp-close">
    <span id="dp-title" style="font-size:13px;font-weight:600"></span>
    <button id="dp-close-btn">✕</button>
  </div>
  <div id="dp-body"></div>
</div>

<script>
// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let DATA = null;
let nodeMap = {};
let focusedId = null;
let activeTiers = new Set();
let searchTerm = '';

const TIER_COLORS = {
  gold_analytics: '#ca8a04',
  gold_silver:    '#16a34a',
  silver:         '#2563eb',
  source:         '#7c3aed',
};

// ─────────────────────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────────────────────
async function loadData() {
  try {
    // Try relative path for GitHub Pages, fall back to same-dir
    const urls = ['assets/data/lineage.json', '/assets/data/lineage.json', 'lineage.json'];
    let res = null;
    for (const url of urls) {
      try { res = await fetch(url); if (res.ok) break; } catch(e) {}
    }
    if (!res || !res.ok) throw new Error('Could not load lineage.json');
    DATA = await res.json();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#ef4444">Failed to load lineage data.<br>${e.message}</p>`;
    return;
  }
  DATA.nodes.forEach(n => nodeMap[n.id] = n);
  init();
}

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
function init() {
  activeTiers = new Set(DATA.tier_order);
  buildTierFilters();
  renderSidebar();
  renderOverview();
  setupSearch();

  document.getElementById('overview-btn').onclick = () => { focusedId = null; renderOverview(); };
  document.getElementById('back-btn').onclick     = () => { focusedId = null; renderOverview(); };
  document.getElementById('dp-close-btn').onclick = closeDetail;
}

// ─────────────────────────────────────────────────────
// TIER FILTER PILLS
// ─────────────────────────────────────────────────────
function buildTierFilters() {
  const el = document.getElementById('tier-filters');
  DATA.tier_order.forEach(tier => {
    const meta = DATA.tiers[tier];
    const pill = document.createElement('div');
    pill.className = 'tier-pill active';
    pill.style.color = meta.color;
    pill.style.backgroundColor = meta.color + '22';
    pill.style.borderColor = meta.color + '66';
    pill.textContent = meta.label;
    pill.onclick = () => toggleTier(tier, pill);
    el.appendChild(pill);
  });
}

function toggleTier(tier, pill) {
  if (activeTiers.has(tier)) { activeTiers.delete(tier); pill.classList.remove('active'); }
  else { activeTiers.add(tier); pill.classList.add('active'); }
  renderSidebar();
  if (!focusedId) renderOverview(); else renderFocused(focusedId);
}

// ─────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────
function renderSidebar() {
  const list  = document.getElementById('sidebar-list');
  const q     = searchTerm.toLowerCase();
  list.innerHTML = '';

  // Group by schema
  const groups = {};
  DATA.nodes.forEach(n => {
    if (!activeTiers.has(n.tier)) return;
    if (q && !n.id.toLowerCase().includes(q) && !n.short.toLowerCase().includes(q) && !n.schema.toLowerCase().includes(q)) return;
    (groups[n.schema] = groups[n.schema] || []).push(n);
  });

  Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).forEach(([schema, nodes]) => {
    const grp = document.createElement('div');
    grp.className = 'schema-group';

    const lbl = document.createElement('div');
    lbl.className = 'schema-label';
    lbl.innerHTML = `<span>${schema}</span><span class="count">${nodes.length}</span>`;
    grp.appendChild(lbl);

    const items = document.createElement('div');
    items.className = 'schema-items';
    nodes.sort((a,b) => a.id.localeCompare(b.id)).forEach(n => {
      const row = document.createElement('div');
      row.className = 'sidebar-item' + (focusedId === n.id ? ' active' : '');
      row.dataset.id = n.id;
      row.innerHTML = `
        <span class="si-dot" style="background:${TIER_COLORS[n.tier]}"></span>
        <span class="si-name" title="${n.id}">${n.short}</span>
        ${n.tableau.length ? '<span class="si-badge">T</span>' : ''}
      `;
      row.onclick = () => selectNode(n.id);
      items.appendChild(row);
    });

    lbl.onclick = () => items.style.display = items.style.display === 'none' ? '' : 'none';
    grp.appendChild(items);
    list.appendChild(grp);
  });
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    renderSidebar();
  });
}

// ─────────────────────────────────────────────────────
// SELECT NODE
// ─────────────────────────────────────────────────────
function selectNode(id) {
  focusedId = id;
  renderFocused(id);
  renderSidebar();
  openDetail(id);
}

// ─────────────────────────────────────────────────────
// BFS — get ancestors (transitive deps)
// ─────────────────────────────────────────────────────
function getAncestors(id) {
  const visited = new Set([id]);
  const queue   = [id];
  while (queue.length) {
    const cur = queue.shift();
    const node = nodeMap[cur];
    if (!node) continue;
    node.deps.forEach(d => {
      if (!visited.has(d)) { visited.add(d); queue.push(d); }
    });
  }
  return visited;
}

// ─────────────────────────────────────────────────────
// RENDER OVERVIEW
// ─────────────────────────────────────────────────────
function renderOverview() {
  focusedId = null;
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('topbar-title').textContent = 'Pipeline Overview';

  const tableauCount = DATA.nodes.filter(n => n.tableau.length).length;
  const linkCount = DATA.nodes.reduce((s,n) => s + n.deps.length, 0);
  document.getElementById('topbar-sub').textContent =
    `${DATA.nodes.length} tables · ${linkCount} dependencies · ${tableauCount} Tableau connections`;

  const content = document.getElementById('content');
  content.innerHTML = '';

  // Stats
  const statsBar = document.createElement('div');
  statsBar.id = 'stats-bar';
  DATA.tier_order.filter(t => activeTiers.has(t)).forEach(tier => {
    const cnt = DATA.nodes.filter(n => n.tier === tier && activeTiers.has(n.tier)).length;
    const meta = DATA.tiers[tier];
    const item = document.createElement('div');
    item.className = 'stat-item';
    item.innerHTML = `<span class="stat-val" style="color:${meta.color}">${cnt}</span><span class="stat-lbl">${meta.label}</span>`;
    statsBar.appendChild(item);
  });
  content.appendChild(statsBar);

  // Pipeline wrap
  const wrap = document.createElement('div');
  wrap.id = 'pipeline-wrap';
  content.appendChild(wrap);

  DATA.tier_order.filter(t => activeTiers.has(t)).forEach(tier => {
    const nodes = DATA.nodes.filter(n => n.tier === tier);
    if (!nodes.length) return;
    const meta = DATA.tiers[tier];

    const row = document.createElement('div');
    row.className = 'tier-row';
    row.innerHTML = `
      <div class="tier-header">
        <div class="tier-badge" style="background:${meta.color}"></div>
        <span class="tier-title" style="color:${meta.color}">${meta.label}</span>
        <span class="tier-desc">${meta.desc}</span>
      </div>
      <div class="tier-nodes" id="tier-${tier}"></div>
    `;
    wrap.appendChild(row);

    const nodesEl = row.querySelector('.tier-nodes');
    nodes.sort((a,b) => a.id.localeCompare(b.id)).forEach(n => {
      nodesEl.appendChild(makeCard(n, false, false));
    });
  });
}

// ─────────────────────────────────────────────────────
// RENDER FOCUSED
// ─────────────────────────────────────────────────────
function renderFocused(id) {
  const node = nodeMap[id];
  if (!node) return;

  document.getElementById('back-btn').style.display = '';
  document.getElementById('topbar-title').textContent = node.short;
  document.getElementById('topbar-sub').textContent =
    `${node.schema} · ${node.deps.length} upstream deps`;

  const ancestors = getAncestors(id);

  const content = document.getElementById('content');
  content.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.id = 'pipeline-wrap';
  content.appendChild(wrap);

  DATA.tier_order.filter(t => activeTiers.has(t)).forEach(tier => {
    const nodes = DATA.nodes.filter(n => n.tier === tier && ancestors.has(n.id));
    if (!nodes.length) return;
    const meta = DATA.tiers[tier];

    const row = document.createElement('div');
    row.className = 'tier-row';
    row.innerHTML = `
      <div class="tier-header">
        <div class="tier-badge" style="background:${meta.color}"></div>
        <span class="tier-title" style="color:${meta.color}">${meta.label}</span>
        <span class="tier-desc">${nodes.length} table${nodes.length!==1?'s':''} in dependency chain</span>
      </div>
      <div class="tier-nodes" id="tier-${tier}"></div>
    `;
    wrap.appendChild(row);

    const nodesEl = row.querySelector('.tier-nodes');
    nodes.sort((a,b) => a.id.localeCompare(b.id)).forEach(n => {
      nodesEl.appendChild(makeCard(n, n.id === id, false));
    });
  });

  // Draw arrows after DOM settles
  requestAnimationFrame(() => drawArrows(id, ancestors));
}

// ─────────────────────────────────────────────────────
// MAKE CARD
// ─────────────────────────────────────────────────────
function makeCard(n, isFocused, isFaded) {
  const card = document.createElement('div');
  card.className = 'node-card' + (isFocused?' focused':'') + (isFaded?' faded':'');
  card.id = 'node-' + n.id;
  const color = TIER_COLORS[n.tier];
  const tags = n.tags.slice(0,2).map(t => `<span class="nc-tag">${t}</span>`).join('');
  const tbl = n.tableau.map(t => `<span class="nc-tableau">${t}</span>`).join('');
  card.innerHTML = `
    <div class="nc-top">
      <span class="nc-dot" style="background:${color}"></span>
      <span class="nc-name">${n.short}</span>
    </div>
    <div class="nc-schema">${n.schema}</div>
    ${n.desc ? `<div class="nc-desc">${n.desc}</div>` : ''}
    <div class="nc-foot">
      <span class="nc-type">${n.type}</span>
      ${tags}
      ${tbl}
    </div>
  `;
  card.onclick = () => selectNode(n.id);
  return card;
}

// ─────────────────────────────────────────────────────
// DRAW ARROWS
// ─────────────────────────────────────────────────────
function drawArrows(focusedId, ancestors) {
  const existing = document.getElementById('arrows-svg');
  if (existing) existing.remove();

  const wrap = document.getElementById('pipeline-wrap');
  if (!wrap) return;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id = 'arrows-svg';
  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
  wrap.appendChild(svg);

  const pRect  = wrap.getBoundingClientRect();
  const scroll = document.getElementById('content').scrollTop;

  function nodePos(id) {
    const el = document.getElementById('node-'+id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      cx:  (r.left + r.right)  / 2 - pRect.left,
      top: r.top  - pRect.top  + scroll,
      bot: r.bottom - pRect.top + scroll,
    };
  }

  // Draw edge from each dep → consumer only within ancestors
  const drawn = new Set();
  ancestors.forEach(nodeId => {
    const node = nodeMap[nodeId];
    if (!node) return;
    node.deps.forEach(depId => {
      if (!ancestors.has(depId)) return;
      const key = depId+'→'+nodeId;
      if (drawn.has(key)) return;
      drawn.add(key);

      const src = nodePos(depId);
      const dst = nodePos(nodeId);
      if (!src || !dst) return;

      // Arrow: src.top → dst.bot (upward, src is lower tier)
      const x1 = src.cx, y1 = src.top;
      const x2 = dst.cx, y2 = dst.bot;
      const cp = Math.abs(y2 - y1) * 0.45;

      const isFocusedEdge = nodeId === focusedId || depId === focusedId;
      const color = isFocusedEdge ? '#3b82f6' : '#475569';
      const opacity = isFocusedEdge ? 0.8 : 0.35;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${x1} ${y1} C${x1} ${y1-cp} ${x2} ${y2+cp} ${x2} ${y2}`);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', isFocusedEdge ? '2' : '1.5');
      path.setAttribute('fill','none');
      path.setAttribute('opacity', opacity);
      path.setAttribute('marker-end','url(#arrowhead)');
      svg.appendChild(path);
    });
  });

  // Arrowhead marker
  if (drawn.size > 0) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    defs.innerHTML = `
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
      </marker>`;
    svg.insertBefore(defs, svg.firstChild);

    const totalH = wrap.scrollHeight;
    svg.style.height = totalH + 'px';
  }
}

// ─────────────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────────────
function openDetail(id) {
  const n = nodeMap[id];
  if (!n) return;

  document.getElementById('dp-title').textContent = n.short;
  const body = document.getElementById('dp-body');
  body.innerHTML = '';

  function section(label, html) {
    const s = document.createElement('div');
    s.className = 'dp-section';
    s.innerHTML = `<div class="dp-label">${label}</div>${html}`;
    body.appendChild(s);
  }

  section('Table', `<div class="dp-value" style="font-family:monospace;font-size:11px">${n.schema}.${n.id}</div>`);
  section('Type', `<div class="dp-value">${n.type}</div>`);
  if (n.desc) section('Description', `<div class="dp-value">${n.desc}</div>`);
  if (n.tags.length) {
    section('Tags', n.tags.map(t=>`<span class="dp-tag">${t}</span>`).join(''));
  }

  if (n.deps.length) {
    const depHtml = n.deps.map(d => {
      const dep = nodeMap[d];
      const color = dep ? TIER_COLORS[dep.tier] : '#475569';
      const shortName = dep ? dep.short : d;
      return `<div class="dp-dep" onclick="selectNode('${d}')">
        <span class="dp-dep-dot" style="background:${color}"></span>
        <span class="dp-dep-name" title="${d}">${shortName}</span>
      </div>`;
    }).join('');
    section(`Upstream Dependencies (${n.deps.length})`, depHtml);
  }

  // Who depends on this node
  const consumers = DATA.nodes.filter(x => x.deps.includes(id));
  if (consumers.length) {
    const html = consumers.map(c => {
      const color = TIER_COLORS[c.tier];
      return `<div class="dp-dep" onclick="selectNode('${c.id}')">
        <span class="dp-dep-dot" style="background:${color}"></span>
        <span class="dp-dep-name" title="${c.id}">${c.short}</span>
      </div>`;
    }).join('');
    section(`Downstream Consumers (${consumers.length})`, html);
  }

  if (n.tableau.length) {
    const html = n.tableau.map(t =>
      `<div class="dp-tableau-item"><span class="dp-tableau-icon">📊</span><span class="dp-tableau-name">${t}</span></div>`
    ).join('');
    section('Tableau Dashboards', html);
  }

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ─────────────────────────────────────────────────────
// REDRAW ON SCROLL
// ─────────────────────────────────────────────────────
document.getElementById('content').addEventListener('scroll', () => {
  if (focusedId) {
    const ancestors = getAncestors(focusedId);
    drawArrows(focusedId, ancestors);
  }
});

// ─────────────────────────────────────────────────────
// KICK OFF
// ─────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
